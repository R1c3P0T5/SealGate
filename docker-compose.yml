services:
  backend:
    build: ./backend
    image: ghcr.io/r1c3p0t5/sealgate-backend:latest
    profiles: [server, full]
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
    env_file: ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    image: ghcr.io/r1c3p0t5/sealgate-frontend:latest
    profiles: [server, full]
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [server, full]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped

  worker:
    build: ./jetson
    image: ghcr.io/r1c3p0t5/sealgate-worker:latest
    profiles: [worker, full]
    devices:
      - /dev/video0:/dev/video0
    env_file: ./jetson/.env
    restart: unless-stopped

volumes:
  sqlite-data:
