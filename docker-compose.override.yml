services:
  backend:
    build: ./backend
    image: sealgate-backend:dev
    command: ["uvicorn", "main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  frontend:
    image: sealgate-frontend-dev
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build
    working_dir: /app
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - CI=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./openapi.json:/openapi.json:ro
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build: ./jetson
    image: sealgate-worker:dev
    env_file: ./jetson/.env
    environment:
      BACKEND_URL: ${WORKER_BACKEND_URL:-http://backend:8000}
      BACKEND_WS_URL: ${WORKER_BACKEND_WS_URL:-ws://backend:8000}
    volumes:
      - ./jetson:/app
